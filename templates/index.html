<!DOCTYPE html>
<html>
<head>
    <title>Poaching Detection</title>
    <style>
        body {
            background: #0a0f1e;
            color: white;
            font-family: Arial;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #00ff9d;
            text-align: center;
            font-size: 3em;
        }
        .upload-box {
            border: 3px dashed #00ff9d;
            padding: 50px;
            text-align: center;
            border-radius: 20px;
            margin: 30px 0;
        }
        button {
            background: #00ff9d;
            color: black;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
        }
        .alert {
            background: #ff3b3b30;
            border-left: 5px solid #ff3b3b;
            padding: 15px;
            margin: 10px 0;
        }
        .alert img {
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦁 Poaching Detection</h1>
        
        <div class="upload-box">
            <h2>Upload Drone Video</h2>
            <form action="/upload" method="post" enctype="multipart/form-data">
                <input type="file" name="video" accept="video/*" required>
                <br><br>
                <button type="submit">Analyze Video</button>
            </form>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        document.querySelector('form').onsubmit = async (e) => {
            e.preventDefault();
            let formData = new FormData(e.target);
            let res = await fetch('/upload', {method:'POST', body:formData});
            let data = await res.json();
            
            let html = '<h2>🚨 Alerts Found: ' + data.alerts.length + '</h2>';
            data.alerts.forEach(a => {
                html += '<div class="alert">';
                html += '<h3>' + a.type.toUpperCase() + ' detected!</h3>';
                html += '<p>Time: ' + a.time + '</p>';
                html += '<img src="' + a.image + '?t=' + Date.now() + '">';
                html += '</div>';
            });
            document.getElementById('results').innerHTML = html;
        };
    </script>
</body>
</html>
