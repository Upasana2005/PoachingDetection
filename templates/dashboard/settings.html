{% extends "layout/base.html" %}

{% block title %}Settings - EcoEye AI{% endblock %}

{% block content %}
<div style="padding: 100px 5% 50px; min-height: 80vh;">
    <h1 style="font-size: 2.5rem; background: linear-gradient(135deg, #E17564, #7AAACE); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px;">Account Settings</h1>
    
    <div style="max-width: 600px; margin: 0 auto;">
        <div style="background: rgba(22, 71, 106, 0.3); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px;">
            <form method="POST" action="{{ url_for('update_settings') }}">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: #F7F8F0;">Username</label>
                    <input type="text" value="{{ current_user.username }}" disabled style="width: 100%; padding: 12px; background: rgba(9, 18, 44, 0.5); border: 1px solid #7AAACE; border-radius: 8px; color: #9CD5FF;">
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: #F7F8F0;">Email</label>
                    <input type="email" value="{{ current_user.email }}" disabled style="width: 100%; padding: 12px; background: rgba(9, 18, 44, 0.5); border: 1px solid #7AAACE; border-radius: 8px; color: #9CD5FF;">
                </div>
                
                <div style="margin-bottom: 30px;">
                    <label style="display: block; margin-bottom: 8px; color: #F7F8F0;">Company/Organization</label>
                    <input type="text" name="company" value="{{ current_user.company or '' }}" placeholder="Enter your organization" style="width: 100%; padding: 12px; background: rgba(9, 18, 44, 0.5); border: 1px solid #7AAACE; border-radius: 8px; color: #F7F8F0;">
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%;">Save Changes</button>
            </form>
            
            <hr style="border: 1px solid rgba(122, 170, 206, 0.2); margin: 30px 0;">
            
            <div style="text-align: center;">
                <p style="color: #9CD5FF; margin-bottom: 10px;">Account created: {{ current_user.created_at.strftime('%Y-%m-%d') }}</p>
                <a href="{{ url_for('logout') }}" style="color: #BE3144;">Logout</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
