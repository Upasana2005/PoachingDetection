{% extends "layout/base.html" %}

{% block title %}Upload Video - EcoEye AI{% endblock %}

{% block content %}
<div style="padding: 100px 5% 50px; min-height: 80vh;">
    <h1 style="font-size: 2.5rem; background: linear-gradient(135deg, #E17564, #7AAACE); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px;">Upload Video for Analysis</h1>
    
    <div style="background: rgba(22, 71, 106, 0.3); backdrop-filter: blur(10px); padding: 50px; border-radius: 20px; max-width: 800px; margin: 0 auto;">
        <div style="border: 3px dashed #7AAACE; border-radius: 20px; padding: 60px; text-align: center; margin-bottom: 30px;">
            <div style="font-size: 5rem; margin-bottom: 20px;">📹</div>
            <h3 style="color: #E17564; margin-bottom: 10px;">Drag & Drop Video</h3>
            <p style="color: #9CD5FF; margin-bottom: 20px;">or click to browse (MP4, AVI, MOV, MKV - max 500MB)</p>
            <input type="file" id="videoFile" accept="video/*" style="display: none;">
            <button onclick="document.getElementById('videoFile').click()" class="btn-secondary">Choose File</button>
        </div>
        
        <div id="fileInfo" style="background: rgba(9, 18, 44, 0.5); padding: 20px; border-radius: 10px; margin-bottom: 20px; display: none;">
            <p><strong>Selected:</strong> <span id="fileName"></span></p>
            <p><strong>Size:</strong> <span id="fileSize"></span> MB</p>
        </div>
        
        <div id="progressContainer" style="display: none;">
            <div style="width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden;">
                <div id="progressBar" style="height: 100%; background: linear-gradient(90deg, #872341, #E17564); width: 0%;"></div>
            </div>
            <p id="progressText" style="text-align: center; margin-top: 10px; color: #E17564;">Processing...</p>
        </div>
        
        <button id="uploadBtn" class="btn-primary" style="width: 100%;" disabled>Start Analysis</button>
    </div>
</div>

<script>
    const fileInput = document.getElementById('videoFile');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const uploadBtn = document.getElementById('uploadBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    
    let selectedFile = null;
    
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            selectedFile = file;
            fileInfo.style.display = 'block';
            fileName.textContent = file.name;
            fileSize.textContent = (file.size / (1024 * 1024)).toFixed(2);
            uploadBtn.disabled = false;
        }
    });
    
uploadBtn.addEventListener('click', async function() {
    if (!selectedFile) return;
    
    const formData = new FormData();
    formData.append('video', selectedFile);
    
    uploadBtn.disabled = true;
    progressContainer.style.display = 'block';
    progressBar.style.width = '0%';
    progressText.textContent = 'Uploading...';
    
    try {
        const response = await fetch('/upload-video', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        
        if (result.success) {
            progressBar.style.width = '100%';
            progressText.textContent = 'Upload Complete!';
            
            // Show success message
            setTimeout(() => {
                if (result.redirect) {
                    window.location.href = result.redirect;
                }
            }, 1500);
        } else {
            progressContainer.style.display = 'none';
            uploadBtn.disabled = false;
            alert('Upload failed: ' + result.error);
        }
    } catch (error) {
        progressContainer.style.display = 'none';
        uploadBtn.disabled = false;
        alert('Upload failed: ' + error.message);
    }
});
</script>
{% endblock %}
